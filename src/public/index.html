<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Availability Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="topbar-left">
            <div class="brand-mark">AD</div>
            <div>
                <h1 class="app-title">Availability Dashboard</h1>
                <p class="app-subtitle">Information Centre Online Availability View</p>
            </div>
        </div>

        <div class="topbar-right">
            <div id="status" class="status-pill status-idle">Idle</div>
            <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        </div>
    </header>

    <main class="page page-single">
        <section class="list-card compact-card">
            <div class="list-card-header compact-header">
                <div>
                    <h2>Availability List</h2>
                </div>
            </div>

            <div id="list" class="availability-list"></div>
        </section>
    </main>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
